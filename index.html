<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backup Status</title>
<style>
/* === RESET & BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface-2:#21262d;--surface-3:#2d333b;
  --border:#30363d;--text:#c9d1d9;--text-muted:#8b949e;--text-bright:#f0f6fc;
  --green:#3fb950;--green-bg:rgba(63,185,80,.1);--green-bd:rgba(63,185,80,.3);
  --blue:#58a6ff;--blue-bg:rgba(88,166,255,.1);--blue-bd:rgba(88,166,255,.3);
  --amber:#e3b341;--amber-bg:rgba(227,179,65,.1);--amber-bd:rgba(227,179,65,.3);
  --red:#f85149;--red-bg:rgba(248,81,73,.1);--red-bd:rgba(248,81,73,.3);
  --mono:'JetBrains Mono','Fira Code',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --r:8px;--r-sm:4px;--r-lg:12px
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
.wrap{padding:0 32px}

/* === HEADER === */
.hdr{background:linear-gradient(160deg,#1c2128,#161b22);border-bottom:1px solid var(--border);padding:20px 0}
.hdr-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.hdr-brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:42px;height:42px;background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--blue);flex-shrink:0}
.brand-text h1{font-size:19px;font-weight:700;color:var(--text-bright);letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--text-muted);font-family:var(--mono);margin-top:1px}
.hdr-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.health-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.3px}
.health-badge.healthy{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green)}
.health-badge.warning{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber)}
.health-badge.critical{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.hdot{width:7px;height:7px;border-radius:50%;animation:blink 2s ease-in-out infinite}
.healthy .hdot{background:var(--green)}.warning .hdot{background:var(--amber)}.critical .hdot{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.last-upd{font-size:11px;color:var(--text-muted)}
.last-upd b{font-family:var(--mono);color:var(--text);font-weight:400}

/* === MAIN LAYOUT === */
main{padding:32px 0 16px}
.section{margin-bottom:36px}
.sec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* === STORAGE HERO === */
.stor-card{background:linear-gradient(135deg,var(--surface),#151e2e);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 32px}
.stor-path-row{font-family:var(--mono);font-size:12px;color:var(--text-muted);margin-bottom:22px;display:flex;align-items:center;gap:7px}
.stor-bar-row{display:flex;align-items:center;gap:24px;margin-bottom:24px}
.stor-bar-col{flex:1;min-width:0}
.bar-track{height:20px;background:var(--surface-2);border-radius:100px;overflow:hidden}
.bar-fill{height:100%;border-radius:100px;position:relative;transition:width .8s ease;min-width:4px}
.bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,.18) 65%,transparent 100%)}
.stor-pct{font-family:var(--mono);font-size:68px;font-weight:800;line-height:1;letter-spacing:-3px;white-space:nowrap;min-width:130px;text-align:right}
.stor-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-box{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:4px}
.stat-val{font-family:var(--mono);font-size:26px;font-weight:700}
.stat-val.used{color:var(--blue)}.stat-val.free{color:var(--green)}.stat-val.total{color:var(--text-bright)}

/* === BACKUP GRID === */
.sub-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sub-title{font-size:13px;font-weight:600;color:var(--text)}
.chip{font-size:10px;font-weight:500;background:var(--surface-2);border:1px solid var(--border);border-radius:100px;padding:1px 8px;color:var(--text-muted)}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px}

/* === BACKUP CARD === */
.bcard{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:var(--r-lg);padding:15px;display:flex;flex-direction:column;gap:0;transition:box-shadow .2s}
.bcard:hover{box-shadow:0 6px 24px rgba(0,0,0,.4)}
.bcard.success{border-left-color:var(--green)}
.bcard.failed{border-left-color:var(--red);background:linear-gradient(135deg,var(--surface),rgba(248,81,73,.04))}
.bcard-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:11px}
.bcard-name{font-size:13px;font-weight:600;color:var(--text-bright);line-height:1.3;word-break:break-word}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.6px;white-space:nowrap;flex-shrink:0}
.sbadge.success{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green)}
.sbadge.failed{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.sdot{width:5px;height:5px;border-radius:50%}
.sbadge.success .sdot{background:var(--green)}.sbadge.failed .sdot{background:var(--red)}
.bfields{display:flex;flex-direction:column;gap:5px}
.bfield{display:flex;gap:8px;font-size:12px;line-height:1.4}
.blbl{color:var(--text-muted);min-width:62px;flex-shrink:0;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding-top:1px}
.bval{color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.snap{font-family:var(--mono);font-size:11px;color:var(--blue);background:var(--blue-bg);border-radius:var(--r-sm);padding:0 5px}

/* === AGE ICON === */
.age-icon{display:inline-flex;align-items:center;flex-shrink:0}
.age-icon.fresh{color:var(--green)}.age-icon.aging{color:var(--amber)}.age-icon.stale{color:var(--red)}

/* === TAGS === */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;padding-top:10px;border-top:1px solid var(--surface-2)}
.tag{font-size:10px;font-weight:500;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:2px 7px;color:var(--text-muted)}

/* === SNAPSHOT HISTORY === */
.snap-toggle{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--surface-2);cursor:pointer;color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;user-select:none;transition:color .15s}
.snap-toggle:hover{color:var(--text)}
.snap-chevron{transition:transform .2s;font-size:11px;line-height:1}
.snap-chevron.open{transform:rotate(180deg)}
.snap-hist{margin-top:8px}
.snap-table{width:100%;border-collapse:collapse;font-size:11px}
.snap-table th{text-align:left;color:var(--text-muted);font-size:9px;text-transform:uppercase;letter-spacing:.5px;padding:4px 6px;border-bottom:1px solid var(--border)}
.snap-table td{padding:5px 6px;color:var(--text);border-bottom:1px solid var(--surface-2)}
.snap-table tr:last-child td{border-bottom:none}
.snap-id-td{font-family:var(--mono);font-size:10px;color:var(--blue)}

/* === CARD ACTION BUTTON === */
.bcard-footer{margin-top:10px;padding-top:10px;border-top:1px solid var(--surface-2)}
.cmd-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:6px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);color:var(--text-muted);font-size:11px;font-family:var(--sans);cursor:pointer;transition:all .15s}
.cmd-btn:hover{border-color:var(--amber-bd);color:var(--amber);background:var(--amber-bg)}

/* === MODAL === */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;padding:20px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);width:100%;max-width:640px;overflow:hidden;transform:translateY(10px) scale(.98);transition:transform .2s}
.modal-overlay.open .modal-box{transform:none}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:linear-gradient(135deg,#1e2430,var(--surface));border-bottom:1px solid var(--border)}
.modal-title-row{display:flex;align-items:center;gap:8px}
.modal-title{font-size:15px;font-weight:600;color:var(--text-bright)}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:2px 8px;border-radius:var(--r-sm);line-height:1;transition:all .15s}
.modal-close:hover{color:var(--text-bright);background:var(--surface-2)}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:16px}
.ctrl-grp{display:flex;flex-direction:column;gap:5px}
.ctrl-lbl{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.3px}
.ctrl-sel{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:8px 32px 8px 12px;font-size:13px;font-family:var(--sans);cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%238b949e' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 10px center;background-size:16px;width:100%;transition:border-color .15s}
.ctrl-sel:focus{outline:none;border-color:var(--blue-bd);box-shadow:0 0 0 2px rgba(88,166,255,.15)}
.cmd-out{background:#0d1117;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cmd-out-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:#1c2128;border-bottom:1px solid var(--border)}
.cmd-out-lbl{font-family:var(--mono);font-size:11px;color:var(--text-muted)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:none;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text-muted);font-size:11px;font-family:var(--sans);cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--blue-bd);color:var(--blue);background:var(--blue-bg)}
.copy-btn.copied{border-color:var(--green-bd);color:var(--green);background:var(--green-bg)}
.cmd-code{padding:16px;font-family:var(--mono);font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-all;min-height:56px}
.t-sudo{color:#f85149}.t-cmd{color:#58a6ff}.t-flag{color:#e3b341}.t-path{color:#a5d6ff}.t-snap{color:#e3b341;font-weight:600}.t-act{color:#3fb950}

/* === FOOTER === */
footer{border-top:1px solid var(--border);padding:20px 0;text-align:center;color:var(--text-muted);font-size:11px;margin-top:8px}
footer code{font-size:10px;color:var(--text);font-family:var(--mono)}

/* === RESPONSIVE === */
@media(max-width:1400px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:750px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
  .hdr-row{flex-direction:column;align-items:flex-start}
  .hdr-meta{align-items:flex-start}
  .stor-bar-row{flex-direction:column;align-items:stretch;gap:10px}
  .stor-pct{text-align:left;font-size:48px;min-width:auto}
  .stor-stats{grid-template-columns:repeat(3,1fr)}
  .modal-overlay{align-items:flex-end;padding:0}
  .modal-box{border-radius:var(--r-lg) var(--r-lg) 0 0;max-width:100%}
  .wrap{padding:0 16px}
}
</style>
</head>

async function loadData() {
  try { const r = await fetch('/status.json'); if (!r.ok) throw 0; return await r.json(); }
  catch { return SAMPLE_DATA; }
}

// ── HELPERS ───────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function cleanName(name,type){if(type==='volume'){const i=name.indexOf('_');let s=i!==-1?name.slice(i+1):name;return s.replace(/-data$/,'');}return name;}
function displayName(name,type){return cleanName(name,type).split('-').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');}
function pad(n){return String(n).padStart(2,'0');}
function formatDate(iso){const d=new Date(iso);const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return `${pad(d.getDate())} ${mo[d.getMonth()]} ${d.getFullYear()}, ${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function formatSize(mb){if(!mb||mb===0)return '0 MB';if(mb<0.1)return '< 0.1 MB';if(mb<1000)return `${parseFloat(mb.toFixed(1))} MB`;return `${(mb/1024).toFixed(2)} GB`;}
function getHealth(bs){if(bs.some(b=>b.status!=='success'))return 'critical';const stale=25*3600*1000;if(bs.some(b=>Date.now()-new Date(b.last_run).getTime()>stale))return 'warning';return 'healthy';}
function healthLabel(h){return {healthy:'All Systems Healthy',warning:'Backups Stale',critical:'Backup Failure'}[h];}
function ageClass(iso){const h=(Date.now()-new Date(iso).getTime())/3600000;return h<24?'fresh':h<48?'aging':'stale';}

// ── COMMANDS ──────────────────────────────────────────────────────
const NEEDS_SNAP=new Set(['restore-full','restore-temp','list-files']);
function generateCmd(snapId,action){
  const base='sudo restic -r /mnt/backup/restic --password-file /etc/restic-password';
  return {
    'restore-full':`${base} restore ${snapId} --target /`,
    'restore-temp':`${base} restore ${snapId} --target /tmp/restic-restore`,
    'list-files':  `${base} ls ${snapId}`,
    'prune':       `${base} forget --keep-daily 7 --prune`,
    'rebuild':     `${base} rebuild-index`,
    'unlock':      `${base} unlock`
  }[action]||'';
}
function highlight(cmd){
  const acts=new Set(['restore','ls','forget','rebuild-index','unlock']);
  return cmd.split(' ').map(t=>{
    if(t==='sudo')return `<span class="t-sudo">${t}</span>`;
    if(t==='restic')return `<span class="t-cmd">${t}</span>`;
    if(t.startsWith('--')||(t.startsWith('-')&&t.length>1&&t[1]!='/'))return `<span class="t-flag">${t}</span>`;
    if(/^[a-f0-9]{8}$/.test(t))return `<span class="t-snap">${t}</span>`;
    if(t.startsWith('/'))return `<span class="t-path">${t}</span>`;
    if(acts.has(t))return `<span class="t-act">${t}</span>`;
    return t;
  }).join(' ');
}

  copy:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`,
  check:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  folder:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>`,
  box:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>`,
  chevron:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`
};

// ── MODULE STATE ──────────────────────────────────────────────────
let _backups=[];
let _modalCmd='';
let _modalSnapId='';

// ── CARD BUILDER ──────────────────────────────────────────────────
function buildCard(b,idx){
  const name=displayName(b.name,b.type);
  const st=b.status==='success'?'success':'failed';
  const age=ageClass(b.last_run);
  const snapRows=(b.snapshots||[]).map(s=>`<tr><td><span class="snap">${esc(s.id)}</span></td><td>${esc(formatDate(s.time))}</td><td>${esc(formatSize(s.size_mb))}</td></tr>`).join('');
  const snapCount=(b.snapshots||[]).length;
  const tagsHtml=b.contents?`<div class="tags">${b.contents.map(c=>`<span class="tag">${esc(c)}</span>`).join('')}</div>`:'';
  return `<div class="bcard ${st}">
  <div class="bcard-head"><div class="bcard-name">${esc(name)}</div><div class="sbadge ${st}"><span class="sdot"></span>${st==='success'?'SUCCESS':'FAILED'}</div></div>
  <div class="bfields">
    <div class="bfield"><span class="blbl">Last run</span><span class="bval">${esc(formatDate(b.last_run))}<span class="age-icon ${age}" title="${age}">${IC.clock}</span></span></div>
    <div class="bfield"><span class="blbl">Snapshot</span><span class="bval"><span class="snap">${esc(b.snapshot_id)}</span></span></div>
    <div class="bfield"><span class="blbl">Size</span><span class="bval">${esc(formatSize(b.size_mb))}</span></div>
  </div>
  ${tagsHtml}
  <div class="snap-toggle" onclick="toggleHistory(${idx})">
    <span>Snapshots (${snapCount})</span>
    <span class="snap-chevron" id="chev-${idx}">${IC.chevron}</span>
  </div>
  <div class="snap-hist" id="hist-${idx}" hidden>
    <table class="snap-table">
      <thead><tr><th>ID</th><th>Date / Time</th><th>Size</th></tr></thead>
      <tbody>${snapRows}</tbody>
    </table>
  </div>
  <div class="bcard-footer"><button class="cmd-btn" onclick="openModal(${idx})">${IC.term} Generate Command</button></div>
</div>`;
}

// ── RENDER ────────────────────────────────────────────────────────
function render(data){
  _backups=data.backups;
  const {repository:repo,last_updated}=data;
  const health=getHealth(_backups);
  const files=_backups.filter(b=>b.type==='files');
  const vols=_backups.filter(b=>b.type==='volume');
  const pct=repo.drive_percent_used;
  const barCol=pct<60?'var(--green)':pct<80?'var(--amber)':'var(--red)';
  const pctCol=pct<60?'var(--green)':pct<80?'var(--amber)':'var(--red)';

  document.getElementById('app').innerHTML=`
<header class="hdr"><div class="wrap"><div class="hdr-row">
  <div class="hdr-brand">
    <div class="brand-icon">${IC.server}</div>
    <div class="brand-text"><h1>Backup Status</h1><div class="brand-sub">homeserver &nbsp;·&nbsp; /mnt/backup/restic</div></div>
  </div>
  <div class="hdr-meta">
    <div class="health-badge ${health}"><span class="hdot"></span>${healthLabel(health)}</div>
    <div class="last-upd">Updated <b>${esc(formatDate(last_updated))}</b></div>
  </div>
</div></div></header>

<main><div class="wrap">

<div class="section">
  <div class="sec-label">Backup Drive</div>
  <div class="stor-card">
    <div class="stor-path-row"><span style="color:var(--blue)">${IC.disk}</span>${esc(repo.path)}</div>
    <div class="stor-bar-row">
      <div class="stor-bar-col">
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barCol}"></div></div>
      </div>
      <div class="stor-pct" style="color:${pctCol}">${pct}%</div>
    </div>
    <div class="stor-stats">
      <div class="stat-box"><div class="stat-lbl">Used</div><div class="stat-val used">${repo.drive_used_gb} GB</div></div>
      <div class="stat-box"><div class="stat-lbl">Free</div><div class="stat-val free">${repo.drive_free_gb} GB</div></div>
      <div class="stat-box"><div class="stat-lbl">Total</div><div class="stat-val total">${repo.drive_total_gb} GB</div></div>
    </div>
  </div>
</div>

<div class="section">
  <div class="sec-label">Backups</div>
  <div class="sub-hdr"><span style="color:var(--blue)">${IC.folder}</span><span class="sub-title">Configuration Files</span><span class="chip">${files.length}</span></div>
  <div class="grid">${files.map((b,i)=>buildCard(b,_backups.indexOf(b))).join('')}</div>
  <div class="sub-hdr"><span style="color:var(--amber)">${IC.box}</span><span class="sub-title">Docker Volumes</span><span class="chip">${vols.length}</span></div>
  <div class="grid">${vols.map((b,i)=>buildCard(b,_backups.indexOf(b))).join('')}</div>
</div>

</div></main>

<footer><div class="wrap">Restic Backup Dashboard &nbsp;·&nbsp; Data from <code>/var/lib/restic-status.json</code></div></footer>

<div class="modal-overlay" id="modal" onclick="onOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title-row"><span style="color:var(--amber)">${IC.term}</span><span class="modal-title" id="modal-title"></span></div>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div class="modal-body">
      <div class="ctrl-grp">
        <label class="ctrl-lbl">Action</label>
        <select class="ctrl-sel" id="modal-act" onchange="updateModalCmd()">
          <option value="restore-full">Restore snapshot</option>
          <option value="restore-temp">Deploy snapshot in new location</option>
          <option value="list-files">List files in snapshot</option>
          <option value="prune">Prune snapshots</option>
          <option value="rebuild">Rebuild repository index</option>
          <option value="unlock">Unlock repository</option>
        </select>
      </div>
      <div class="cmd-out">
        <div class="cmd-out-bar">
          <span class="cmd-out-lbl">bash</span>
          <button class="copy-btn" id="modal-copy" onclick="modalCopy()">${IC.copy} Copy</button>
        </div>
        <div class="cmd-code" id="modal-cmd"></div>
      </div>
    </div>
  </div>
</div>`;
}

// ── SNAPSHOT HISTORY TOGGLE ───────────────────────────────────────
function toggleHistory(idx){
  const el=document.getElementById('hist-'+idx);
  const ch=document.getElementById('chev-'+idx);
  const open=el.hidden;
  el.hidden=!open;
  if(ch)ch.classList.toggle('open',open);
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(idx){
  const b=_backups[idx];
  if(!b)return;
  _modalSnapId=b.snapshot_id;
  document.getElementById('modal-title').textContent=displayName(b.name,b.type);
  document.getElementById('modal-act').value='restore-full';
  const copyBtn=document.getElementById('modal-copy');
  copyBtn.className='copy-btn';
  copyBtn.innerHTML=IC.copy+' Copy';
  updateModalCmd();
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
function onOverlayClick(e){if(e.target===document.getElementById('modal'))closeModal();}
function updateModalCmd(){
  const action=document.getElementById('modal-act').value;
  _modalCmd=generateCmd(_modalSnapId,action);
  document.getElementById('modal-cmd').innerHTML=highlight(_modalCmd);
}
function modalCopy(){
  const btn=document.getElementById('modal-copy');
  const ok=()=>{btn.className='copy-btn copied';btn.innerHTML=IC.check+' Copied!';setTimeout(()=>{btn.className='copy-btn';btn.innerHTML=IC.copy+' Copy';},2000);};
  if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(_modalCmd).then(ok).catch(fb);}else{fb();}
  function fb(){const t=Object.assign(document.createElement('textarea'),{value:_modalCmd});Object.assign(t.style,{position:'fixed',opacity:'0'});document.body.appendChild(t);t.select();try{document.execCommand('copy');ok();}catch(e){}document.body.removeChild(t);}
}

// ── ESCAPE KEY CLOSES MODAL ───────────────────────────────────────
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ── EXPOSE GLOBALS & INIT ─────────────────────────────────────────
window.toggleHistory=toggleHistory;
window.openModal=openModal;
window.closeModal=closeModal;
window.onOverlayClick=onOverlayClick;
window.updateModalCmd=updateModalCmd;
window.modalCopy=modalCopy;
loadData().then(render);
</script>
</body>
</html>
